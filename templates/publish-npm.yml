# Publish workflow for npm projects.
# Triggered when a version tag (v*) is pushed.
# Generated by the /release skill. Adapt as needed.
#
# Placeholders (replaced during generation):
#   {{NODE_VERSION}}    — Node.js version (e.g., "lts/*", "20")
#   {{PACKAGE_MANAGER}} — npm, pnpm, yarn, or bun
#   {{SETUP_ACTION}}    — setup action (e.g., "actions/setup-node@v4")
#   {{INSTALL_CMD}}     — install command (e.g., "npm ci")
#   {{EXTRA_SETUP}}     — additional setup steps (e.g., pnpm/action-setup)
#   {{PUBLISH_CMD}}     — publish command (e.g., "npm publish --provenance")
#   {{REGISTRY_URL}}    — registry URL (e.g., "https://registry.npmjs.org")

name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # {{EXTRA_SETUP}}

      - uses: {{SETUP_ACTION}}
        with:
          node-version: "{{NODE_VERSION}}"
          registry-url: "{{REGISTRY_URL}}"

      - run: {{INSTALL_CMD}}

      - run: {{PACKAGE_MANAGER}} run build
        if: ${{ hashFiles('package.json') != '' }}

      - name: Determine publish tag
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "dist_tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "dist_tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-rc"* ]]; then
            echo "dist_tag=rc" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-"* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: |
          if [ "${{ steps.tag.outputs.dist_tag }}" = "latest" ]; then
            {{PUBLISH_CMD}}
          else
            {{PUBLISH_CMD}} --tag ${{ steps.tag.outputs.dist_tag }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
